version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - OPENROUTER_HTTP_REFERER=${OPENROUTER_HTTP_REFERER}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ./backend:/app/backend
      - ./ml-pipeline:/app/ml-pipeline
    networks:
      - docmind-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - docmind-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - docmind-network

  # PgVector (Supabase Alternative - Local)
  postgres:
    image: pgvector/pgvector:pg15-latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=docmind_password
      - POSTGRES_USER=docmind_user
      - POSTGRES_DB=docmind_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - docmind-network

volumes:
  redis_data:
  postgres_data:

networks:
  docmind-network:
    driver: bridge
